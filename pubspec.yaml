name: spendly
description: "Spendly — Premium fintech app for group and personal expense management."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 🔥 Firebase (REQUIRED)

  firebase_core: 2.30.0
  firebase_auth: 4.16.0   
  google_sign_in: 6.2.1   

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.7

  # Charts
  fl_chart: ^0.69.0

  # Fonts
  google_fonts: ^6.2.1

  # Date/time formatting
  intl: ^0.19.0

  # Unique IDs
  uuid: ^4.4.0

  # Icons & UI
  cupertino_icons: ^1.0.8

  # Animations
  flutter_animate: ^4.5.0

  # Image picking
  image_picker: ^1.1.2

  # Local storage
  shared_preferences: ^2.5.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true